name: CI/CD — Test & Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rewrite submodule SSH URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Initialise submodules
        run: git submodule update --init --recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (dev)
        run: uv sync --frozen --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  push-to-dockerhub:
    name: Build & push image to Docker Hub
    runs-on: ubuntu-latest
    environment: dockerhub
    needs: test  # only runs if the test job succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rewrite submodule SSH URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Initialise submodules
        run: git submodule update --init --recursive

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker compose -f podman-compose.yaml build

      - name: Push image
        run: docker compose -f podman-compose.yaml push
