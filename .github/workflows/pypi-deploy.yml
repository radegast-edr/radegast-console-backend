on:
  push:
    tags:
      - "v*"

name: Upload PyPi release

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest

  pypi-publish:
    name: Upload release to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Rewrite submodule SSH URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Initialise submodules
        run: git submodule update --init --recursive
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Build
        env:
          PUBLIC_BACKEND_URL: /api/v1
        run: uv build
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
