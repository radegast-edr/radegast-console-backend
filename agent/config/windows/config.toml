# Rustinel Configuration File for Windows
# This file is optional - the agent will use defaults if not present

# 1. Feature Toggles & Rules
[scanner]
sigma_enabled = true
sigma_rules_path = "C:\\Program Files\\Radegast\\rules\\sigma"
yara_enabled = true
yara_rules_path = "C:\\Program Files\\Radegast\\rules\\yara"

[reload]
enabled = true
debounce_ms = 2000          # poll cadence is max(debounce_ms, 2000)

# Shared allowlist applied to:
# - response.allowlist_paths
# - ioc.hash_allowlist_paths
# - scanner.yara_allowlist_paths
#
# Platform defaults are compiled in — only set this to override them.
#
# Windows defaults:
#   C:\Windows\, C:\Program Files\, C:\Program Files (x86)\

# 2. Operational Logging (The Agent's internal health)
#    Writes to: {directory}/{filename}.<date>
[logging]
level = "info"              # trace, debug, info, warn, error
directory = "logs"
filename = "C:\\Program Files\\Radegast\\logs\\rustinel.log"
console_output = true       # If true, duplicate logs to stdout (dev mode)

# 3. Security Alerts (The Detection Output)
#    Writes to: {directory}/{filename}.<date>
[alerts]
directory = "logs"
filename = "C:\\Program Files\\Radegast\\logs\\alerts.json"    # Will contain newline-delimited JSON (NDJSON)
match_debug = "off"         # off | summary | full (attach match details to alerts.json)

# 4. Active Response (Optional Prevention)
[response]
enabled = false
prevention_enabled = false
min_severity = "critical"   # sigma: critical only; yara always treated as critical
channel_capacity = 128

# 5. Atomic IOC Detection (Hashes, IPs, Domains, Path Regex)
[ioc]
enabled = true
hashes_path = "C:\\Program Files\\Radegast\\rules\\ioc\\hashes.txt"
ips_path = "C:\\Program Files\\Radegast\\rules\\ioc\\ips.txt"
domains_path = "C:\\Program Files\\Radegast\\rules\\ioc\\domains.txt"
paths_regex_path = "C:\\Program Files\\Radegast\\rules\\ioc\\paths_regex.txt"
default_severity = "high"
max_file_size_mb = 50
