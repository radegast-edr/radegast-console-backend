version: '3.8'

services:
  radegast:
    image: docker.io/radegastedr/console:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: radegast-edr
    ports:
      - "8000:8000"
    volumes:
      - radegast_database:/app/data/db
      - radegast_uploads:/app/data/uploads
      - radegast_releases:/app/data/releases
    environment:
      - RADEGAST_SECRET_KEY=change-me-in-production-with-a-real-secure-key
      - RADEGAST_CORS_ORIGINS=http://localhost:8000
      - RADEGAST_BASE_URL=http://localhost:8000
      - RADEGAST_DATABASE_URL=sqlite+aiosqlite:////app/data/db/radegast.db
      - RADEGAST_UPLOAD_DIR=/app/data/uploads
      - RADEGAST_RELEASES_DIR=/app/data/releases
      - RADEGAST_SMTP_HOST=smtp4dev
      - RADEGAST_SMTP_PORT=25
      - RADEGAST_SMTP_STARTTLS=false
    restart: always

  # For easier development, bundle SMTP server
  smtp4dev:
    image: docker.io/rnwood/smtp4dev:v3
    container_name: radegast-smtp4dev
    ports:
      - "127.0.0.1:2525:25"
      - "127.0.0.1:5000:80"
    restart: always

volumes:
  radegast_database:
  radegast_uploads:
  radegast_releases:
